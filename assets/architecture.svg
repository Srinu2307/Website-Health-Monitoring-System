<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#0d1117; font-family:monospace; color:#c9d1d9;">
  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="400" y="40" fill="#58a6ff" font-size="24" text-anchor="middle" font-weight="bold">System Architecture</text>
  
  <g transform="translate(100, 80)">
    <rect width="150" height="50" rx="5" fill="#21262d" stroke="#30363d"/>
    <text x="75" y="30" fill="#c9d1d9" text-anchor="middle">CLI Trigger</text>
  </g>

  <g transform="translate(325, 80)">
    <rect width="150" height="50" rx="5" fill="#21262d" stroke="#58a6ff"/>
    <text x="75" y="30" fill="#58a6ff" text-anchor="middle">DNS Check</text>
  </g>

  <g transform="translate(550, 80)">
    <rect width="150" height="50" rx="5" fill="#21262d" stroke="#238636"/>
    <text x="75" y="30" fill="#238636" text-anchor="middle">ICMP / Network</text>
  </g>

  <g transform="translate(550, 200)">
    <rect width="150" height="50" rx="5" fill="#21262d" stroke="#d29922"/>
    <text x="75" y="30" fill="#d29922" text-anchor="middle">HTTP &amp; Latency</text>
  </g>

  <g transform="translate(325, 200)">
    <rect width="150" height="50" rx="5" fill="#21262d" stroke="#f85149"/>
    <text x="75" y="30" fill="#f85149" text-anchor="middle">Risk Engine</text>
  </g>

  <g transform="translate(100, 200)">
    <rect width="150" height="50" rx="5" fill="#21262d" stroke="#8957e5"/>
    <text x="75" y="30" fill="#8957e5" text-anchor="middle">Reports &amp; Logs</text>
  </g>

  <!-- Arrows -->
  <path d="M250,105 L315,105" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M475,105 L540,105" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M625,130 L625,190" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M550,225 L485,225" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M325,225 L260,225" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e" />
    </marker>
  </defs>
</svg>
