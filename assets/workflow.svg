<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#0d1117; font-family:monospace; color:#c9d1d9;">
  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="400" y="40" fill="#238636" font-size="24" text-anchor="middle" font-weight="bold">Execution Workflow</text>
  
  <circle cx="100" cy="150" r="30" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
  <text x="100" y="155" fill="#58a6ff" text-anchor="middle">Start</text>

  <rect x="200" y="125" width="120" height="50" rx="5" fill="#21262d" stroke="#8b949e"/>
  <text x="260" y="155" fill="#c9d1d9" text-anchor="middle">Read Input</text>

  <rect x="380" y="125" width="120" height="50" rx="5" fill="#21262d" stroke="#8b949e"/>
  <text x="440" y="155" fill="#c9d1d9" text-anchor="middle">Resolve IP</text>

  <rect x="560" y="125" width="120" height="50" rx="5" fill="#21262d" stroke="#8b949e"/>
  <text x="620" y="155" fill="#c9d1d9" text-anchor="middle">Check Ports</text>

  <rect x="560" y="225" width="120" height="50" rx="5" fill="#21262d" stroke="#d29922"/>
  <text x="620" y="255" fill="#d29922" text-anchor="middle">HTTP Status</text>

  <rect x="380" y="225" width="120" height="50" rx="5" fill="#21262d" stroke="#f85149"/>
  <text x="440" y="255" fill="#f85149" text-anchor="middle">Classify Risk</text>

  <circle cx="260" cy="250" r="30" fill="#21262d" stroke="#8957e5" stroke-width="2"/>
  <text x="260" y="255" fill="#8957e5" text-anchor="middle">End</text>

  <path d="M130,150 L190,150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M320,150 L370,150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500,150 L550,150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M620,175 L620,215" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M560,250 L510,250" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M380,250 L295,250" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e" />
    </marker>
  </defs>
</svg>
